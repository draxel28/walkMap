<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WalkMap by Dey</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface2: #1e1e1e;
        --border: #2a2a2a;
        --accent: #c8f542;
        --accent-dim: #a0c430;
        --text: #f0f0f0;
        --muted: #666;
        --pass: #42f5a7;
        --fail: #f56042;
        --radius: 12px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .logo {
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--accent);
        line-height: 1;
      }

      .logo span {
        color: var(--text);
      }

      .loc-pill {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 0.35rem 0.85rem;
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--muted);
        transition: border-color 0.2s;
        cursor: default;
        max-width: 260px;
        overflow: hidden;
      }

      .loc-pill.ready {
        border-color: rgba(200, 245, 66, 0.3);
        color: var(--text);
      }

      .loc-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: background 0.3s;
      }

      .loc-dot.ready {
        background: var(--accent);
        box-shadow: 0 0 0 3px rgba(200, 245, 66, 0.2);
      }
      .loc-dot.pulsing {
        animation: dotPulse 1.2s ease-in-out infinite;
      }

      @keyframes dotPulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(200, 245, 66, 0.4);
        }
        50% {
          opacity: 0.5;
          box-shadow: 0 0 0 5px rgba(200, 245, 66, 0);
        }
      }

      .loc-text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Main layout ── */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 360px 1fr;
        height: calc(100vh - 61px);
      }

      /* ── Sidebar ── */
      aside {
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-inner {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .sidebar-inner::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar-inner::-webkit-scrollbar-track {
        background: transparent;
      }
      .sidebar-inner::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .panel {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .panel-head {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.65rem;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .panel-body {
        padding: 1rem;
      }

      /* ── Search box ── */
      .search-row {
        display: flex;
        gap: 0.5rem;
      }

      input[type="text"] {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem 0.9rem;
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 0.82rem;
        outline: none;
        transition: border-color 0.15s;
        min-width: 0;
      }

      input:focus {
        border-color: var(--accent);
      }
      input::placeholder {
        color: var(--muted);
      }

      button {
        font-family: "DM Mono", monospace;
        font-size: 0.8rem;
        padding: 0.65rem 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.1s;
        flex-shrink: 0;
      }

      button:hover {
        background: var(--border);
      }
      button:active {
        transform: scale(0.97);
      }

      button.primary {
        background: var(--accent);
        color: #0a0a0a;
        border-color: var(--accent);
        font-weight: 500;
      }

      button.primary:hover {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
      }
      button.sm {
        padding: 0.4rem 0.75rem;
        font-size: 0.72rem;
      }

      /* ── Status ── */
      #mapStatus {
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.6rem;
        min-height: 1rem;
        line-height: 1.4;
      }

      /* ── Route info ── */
      .route-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.75rem 0.9rem;
      }

      .stat-label {
        font-size: 0.62rem;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 3px;
      }

      .stat-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.02em;
      }

      /* ── Steps ── */
      .steps-head {
        font-size: 0.62rem;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 0.6rem;
      }

      #stepsList {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      #stepsList li {
        display: flex;
        gap: 0.65rem;
        align-items: flex-start;
        padding: 0.5rem 0.7rem;
        background: var(--surface);
        border-radius: 7px;
        font-size: 0.75rem;
        line-height: 1.5;
        color: var(--text);
        border: 1px solid transparent;
        transition: border-color 0.15s;
      }

      #stepsList li:hover {
        border-color: var(--border);
      }

      .step-num {
        min-width: 20px;
        height: 20px;
        background: var(--border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.6rem;
        color: var(--muted);
        flex-shrink: 0;
        margin-top: 1px;
      }

      .step-dist {
        margin-left: auto;
        padding-left: 8px;
        flex-shrink: 0;
        color: var(--muted);
        font-size: 0.7rem;
      }

      /* ── Location detail ── */
      .loc-detail-row {
        display: flex;
        justify-content: space-between;
        padding: 0.35rem 0;
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
      }

      .loc-detail-row:last-child {
        border-bottom: none;
      }
      .loc-detail-row span:last-child {
        color: var(--text);
        text-align: right;
      }

      .loc-address-full {
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        color: var(--text);
        line-height: 1.6;
        margin-bottom: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--border);
      }

      #osmLink {
        display: none;
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
        text-decoration: none;
        margin-top: 0.75rem;
      }

      #osmLink:hover {
        text-decoration: underline;
      }

      /* pulse text */
      @keyframes textPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .pulsing {
        animation: textPulse 1.3s ease-in-out infinite;
      }

      /* ── Map ── */
      #map {
        flex: 1;
        filter: invert(1) hue-rotate(180deg) brightness(0.82) saturate(0.85);
      }

      /* ── Empty route state ── */
      #routePanel {
        display: none;
      }
      #routePanel.visible {
        display: block;
      }

      /* Leaflet overrides */
      .leaflet-popup-content-wrapper {
        background: var(--surface) !important;
        color: var(--text) !important;
        border: 1px solid var(--border) !important;
        border-radius: 10px !important;
        font-family: "DM Mono", monospace !important;
        font-size: 0.75rem !important;
        box-shadow: none !important;
      }
      .leaflet-popup-tip {
        background: var(--surface) !important;
      }
      .leaflet-control-zoom a {
        background: var(--surface) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }
      .leaflet-control-zoom a:hover {
        background: var(--surface2) !important;
      }

      /* ── Responsive ── */
      @media (max-width: 700px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
          height: auto;
        }
        aside {
          max-height: 60vh;
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        #map {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Walk<span>Map</span></div>
      <div class="loc-pill" id="locPill">
        <div class="loc-dot pulsing" id="locDot"></div>
        <span class="loc-text" id="locPillText">Detecting location…</span>
      </div>
    </header>

    <main>
      <!-- Sidebar -->
      <aside>
        <div class="sidebar-inner">
          <!-- Search destination -->
          <div class="panel">
            <div class="panel-head">Search Destination</div>
            <div class="panel-body">
              <div class="search-row">
                <input
                  type="text"
                  id="destInput"
                  placeholder="e.g. SM Mall, Jollibee Taft…"
                />
                <button class="primary" onclick="getRoute()">Go</button>
              </div>
              <div id="mapStatus" class="pulsing">
                Waiting for your location…
              </div>
            </div>
          </div>

          <!-- Route result -->
          <div class="panel" id="routePanel">
            <div class="panel-head">Route Info</div>
            <div class="panel-body">
              <div class="route-stats">
                <div class="stat-card">
                  <div class="stat-label">Walking time</div>
                  <div class="stat-value" id="routeTime">—</div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Distance</div>
                  <div class="stat-value" id="routeDist">—</div>
                </div>
              </div>
              <div class="steps-head">Turn-by-turn</div>
              <ol id="stepsList"></ol>
            </div>
          </div>

          <!-- Your location detail -->
          <div class="panel">
            <div class="panel-head">Your Location</div>
            <div class="panel-body">
              <div class="loc-address-full pulsing" id="locAddress">
                Detecting…
              </div>
              <div class="loc-detail-row">
                <span>Latitude</span><span id="locLat">—</span>
              </div>
              <div class="loc-detail-row">
                <span>Longitude</span><span id="locLon">—</span>
              </div>
              <div class="loc-detail-row">
                <span>Accuracy</span><span id="locAcc">—</span>
              </div>
              <a id="osmLink" href="#" target="_blank"
                >&#10138; Open on OpenStreetMap</a
              >
              <div
                style="
                  margin-top: 0.75rem;
                  display: flex;
                  gap: 0.5rem;
                  flex-wrap: wrap;
                "
              >
                <button
                  class="sm"
                  onclick="retryLocation()"
                  id="retryBtn"
                  style="display: none"
                >
                  &#8635; Retry
                </button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Map -->
      <div id="map"></div>
    </main>

    <script>
      // ── State ────────────────────────────────────────────
      let currentLat = null,
        currentLon = null,
        locationReady = false;

      // ── Map init ─────────────────────────────────────────
      const map = L.map("map", { zoomControl: true });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);
      map.setView([14.5995, 120.9842], 13);

      let userMarker = null,
        destMarker = null,
        routeLayer = null;

      const userIcon = L.divIcon({
        className: "",
        html: `<div style="width:14px;height:14px;background:#c8f542;border:2.5px solid #0a0a0a;border-radius:50%;box-shadow:0 0 0 5px rgba(200,245,66,0.2)"></div>`,
        iconAnchor: [7, 7],
      });
      const destIcon = L.divIcon({
        className: "",
        html: `<div style="width:14px;height:14px;background:#f56042;border:2.5px solid #0a0a0a;border-radius:50%;box-shadow:0 0 0 5px rgba(245,96,66,0.2)"></div>`,
        iconAnchor: [7, 7],
      });

      // ── Helpers ──────────────────────────────────────────
      function setMapStatus(msg, color, pulse) {
        const el = document.getElementById("mapStatus");
        el.textContent = msg;
        el.style.color = color || "var(--muted)";
        el.classList.toggle("pulsing", !!pulse);
      }

      function formatDuration(s) {
        const m = Math.round(s / 60);
        if (m < 60) return `${m} min`;
        const h = Math.floor(m / 60),
          r = m % 60;
        return r ? `${h}h ${r}m` : `${h}h`;
      }

      function formatDistance(m) {
        return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(1)} km`;
      }

      function cleanInstruction(step) {
        const { type, modifier = "", exit } = step.maneuver;
        const name = step.name || "the road";
        const tbl = {
          turn: `Turn ${modifier} onto ${name}`,
          "new name": `Continue onto ${name}`,
          depart: `Head ${modifier} on ${name}`,
          arrive: "You have arrived",
          merge: `Merge ${modifier} onto ${name}`,
          fork: `Keep ${modifier} at the fork`,
          "end of road": `Turn ${modifier} at end of ${name}`,
          continue: `Continue on ${name}`,
          roundabout: `Roundabout — take exit ${exit ?? ""}`,
          rotary: `Rotary — take exit ${exit ?? ""}`,
          "roundabout turn": `At roundabout, turn ${modifier}`,
          notification: `Continue on ${name}`,
        };
        return tbl[type] || `${type} ${modifier} on ${name}`;
      }

      // ── Geolocation ──────────────────────────────────────
      async function reverseGeocode(lat, lon) {
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
            { headers: { "Accept-Language": "en" } },
          );
          const data = await res.json();
          return data.display_name ?? "Address unavailable";
        } catch {
          return "Address unavailable";
        }
      }

      async function applyLocation(lat, lon, accuracy, label) {
        currentLat = lat;
        currentLon = lon;
        locationReady = true;

        // Header pill
        const dot = document.getElementById("locDot");
        dot.classList.remove("pulsing");
        dot.classList.add("ready");
        const pill = document.getElementById("locPill");
        pill.classList.add("ready");

        // Location panel
        document.getElementById("locLat").textContent = lat.toFixed(6);
        document.getElementById("locLon").textContent = lon.toFixed(6);
        document.getElementById("locAcc").textContent =
          `±${Math.round(accuracy)} m`;

        const addrEl = document.getElementById("locAddress");
        addrEl.classList.remove("pulsing");
        addrEl.textContent = "Getting address…";

        const osmLink = document.getElementById("osmLink");
        osmLink.href = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}`;
        osmLink.style.display = "block";

        // Map marker
        if (userMarker) {
          userMarker.setLatLng([lat, lon]);
        } else {
          userMarker = L.marker([lat, lon], { icon: userIcon })
            .addTo(map)
            .bindPopup("You are here");
          map.setView([lat, lon], 15);
        }

        setMapStatus(
          `✓ ${label} — type a destination above.`,
          "var(--pass)",
          false,
        );

        // Reverse geocode (background)
        reverseGeocode(lat, lon).then((addr) => {
          addrEl.textContent = addr;
          // Truncate for header pill
          const short = addr.split(",").slice(0, 2).join(",");
          document.getElementById("locPillText").textContent = short;
        });
      }

      function onGeoError(err) {
        const addrEl = document.getElementById("locAddress");
        addrEl.classList.remove("pulsing");
        const msgs = {
          1: "Permission denied.",
          2: "Position unavailable.",
          3: "Timed out.",
        };
        const msg = msgs[err.code] || "Location failed.";
        addrEl.textContent = `⚠ ${msg}`;
        document.getElementById("locPillText").textContent = msg;
        document.getElementById("retryBtn").style.display = "inline-block";
        setMapStatus(`⚠ ${msg} Hit retry.`, "var(--fail)", false);
      }

      function startLocation() {
        if (!navigator.geolocation) {
          document.getElementById("locAddress").textContent =
            "⚠ Not supported.";
          return;
        }
        // Stage 1 — fast (WiFi/cell)
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            applyLocation(
              pos.coords.latitude,
              pos.coords.longitude,
              pos.coords.accuracy,
              "Approximate location",
            );
            // Stage 2 — refine silently with GPS
            navigator.geolocation.getCurrentPosition(
              (pos2) => {
                if (pos2.coords.accuracy < pos.coords.accuracy) {
                  applyLocation(
                    pos2.coords.latitude,
                    pos2.coords.longitude,
                    pos2.coords.accuracy,
                    "Precise location",
                  );
                }
              },
              () => {},
              { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 },
            );
          },
          onGeoError,
          { enableHighAccuracy: false, timeout: 8000, maximumAge: 30000 },
        );
      }

      function retryLocation() {
        document.getElementById("retryBtn").style.display = "none";
        const addrEl = document.getElementById("locAddress");
        addrEl.classList.add("pulsing");
        addrEl.textContent = "Retrying…";
        document.getElementById("locPillText").textContent = "Retrying…";
        document.getElementById("locDot").classList.remove("ready");
        document.getElementById("locDot").classList.add("pulsing");
        document.getElementById("locPill").classList.remove("ready");
        setMapStatus("Retrying…", "var(--muted)", true);
        startLocation();
      }

      // ── Route ────────────────────────────────────────────
      async function geocodePlace(query) {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
          { headers: { "Accept-Language": "en" } },
        );
        const data = await res.json();
        if (!data.length)
          throw new Error("Place not found. Try a more specific name.");
        return {
          lat: parseFloat(data[0].lat),
          lon: parseFloat(data[0].lon),
          name: data[0].display_name,
        };
      }

      async function getRoute() {
        const dest = document.getElementById("destInput").value.trim();
        if (!dest) {
          setMapStatus("⚠ Enter a destination.", "var(--fail)");
          return;
        }
        if (!locationReady) {
          setMapStatus("⚠ Still getting your location…", "var(--fail)");
          return;
        }

        setMapStatus("Searching…", "var(--muted)", true);

        try {
          const place = await geocodePlace(dest);
          const res = await fetch(
            `https://router.project-osrm.org/route/v1/foot/${currentLon},${currentLat};${place.lon},${place.lat}?overview=full&geometries=geojson&steps=true`,
          );
          const data = await res.json();
          if (data.code !== "Ok") throw new Error("No walking route found.");

          const route = data.routes[0];
          const steps = route.legs[0].steps;

          // Markers
          if (destMarker) map.removeLayer(destMarker);
          destMarker = L.marker([place.lat, place.lon], { icon: destIcon })
            .addTo(map)
            .bindPopup(place.name.split(",")[0])
            .openPopup();

          // Route line
          if (routeLayer) map.removeLayer(routeLayer);
          routeLayer = L.geoJSON(route.geometry, {
            style: {
              color: "#9CD5FF",
              weight: 4,
              opacity: 0.9,
              lineCap: "round",
              lineJoin: "round",
              dashArray: "6 5",
            },
          }).addTo(map);

          map.fitBounds(
            L.latLngBounds([currentLat, currentLon], [place.lat, place.lon]),
            { padding: [50, 50] },
          );

          // Stats
          document.getElementById("routeTime").textContent = formatDuration(
            route.duration,
          );
          document.getElementById("routeDist").textContent = formatDistance(
            route.distance,
          );

          // Steps
          const stepsList = document.getElementById("stepsList");
          stepsList.innerHTML = "";
          steps.forEach((step, i) => {
            const li = document.createElement("li");
            const dist =
              step.distance > 5
                ? `<span class="step-dist">${formatDistance(step.distance)}</span>`
                : "";
            li.innerHTML = `<span class="step-num">${i + 1}</span><span style="flex:1">${cleanInstruction(step)}</span>${dist}`;
            stepsList.appendChild(li);
          });

          document.getElementById("routePanel").classList.add("visible");
          setMapStatus(
            `${place.name.split(",")[0]} — ${formatDuration(route.duration)} walk (${formatDistance(route.distance)})`,
            "var(--pass)",
            false,
          );
        } catch (err) {
          setMapStatus(`⚠ ${err.message}`, "var(--fail)", false);
        }
      }

      document.getElementById("destInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") getRoute();
      });

      // ── Boot ─────────────────────────────────────────────
      startLocation();
    </script>
  </body>
</html>
